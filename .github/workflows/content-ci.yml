name: Content CI

on:
  pull_request:
    paths:
      - 'src/content/**'
      - 'content/governance/**'
      - 'scripts/**'
      - 'src/lib/editorial-rules.ts'
      - 'src/lib/banned-claims.ts'
      - 'src/lib/content-loader.ts'
      - 'package.json'
      - 'package-lock.json'

jobs:
  content-checks:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate content
        run: npm run validate:content

      - name: Check banned claims
        run: npm run check:banned-claims -- --all

      - name: Build site
        run: npm run build
